<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="card">

        <div class="brand-mark success-mark">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1 class="card-title">Sign In Successful!</h1>
        <p class="card-subtitle">Welcome back. You have securely logged into your account.</p>

        <div class="dashboard-mockup">
            <div class="stat-box">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-bell"></i>
                <span>Alerts</span>
            </div>
        </div>

        <a href="index.html" class="btn-primary btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Log Out
        </a>

    </div>

</body>

</html>
