<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Login Portal</title>
  <!-- FontAwesome for form icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Unified stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <!-- Brand icon mark (same as welcome page for consistency) -->
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6L12 2z" />
        <polyline points="9 12 11 14 15 10" />
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="card-title">Sign In</h1>
    <p class="card-subtitle">Enter your credentials to access your account.</p>

    <!-- ── Email Field ── -->
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <div class="input-wrap">
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com"
          autocomplete="email" required>
        <!-- Icon sits after the input in the DOM so the focus sibling selector works -->
        <i class="fa-solid fa-envelope" aria-hidden="true"></i>
      </div>
    </div>

    <!-- ── Password Field ── -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password"
          autocomplete="current-password" required>
        <i class="fa-solid fa-lock" aria-hidden="true"></i>
      </div>
    </div>

    <!-- ── Remember me + Forgot password ── -->
    <div class="remember-row">
      <label class="remember-label">
        <input type="checkbox" name="remember">
        Remember me
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <!-- ── Submit button ── -->
    <a href="final.html">
      <button type="button" class="btn-primary">
        Sign In
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </button>
    </a>

    <!-- ── Sign-up prompt ── -->
    <p class="signup-prompt">
      Don't have an account?
      <a href="#">Create one <i class="fa-solid fa-user-plus" aria-hidden="true"></i></a>
    </p>

  </div>

</body>

</html>
